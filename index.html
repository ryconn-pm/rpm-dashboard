<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>RPM Dashboard Archive</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F4F3F0;--surface:#fff;--border:#E2DFD8;--text:#1A1917;--text2:#6B6963;--text3:#9E9A93;--dark:#1F3D87;--mid:#21569B;--light:#247AB9}body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.topbar{height:4px;background:linear-gradient(90deg,#1F3D87,#21569B,#247AB9)}.header{background:var(--dark);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between}.header img{height:40px;filter:brightness(0) invert(1)}.header-title{font-size:18px;font-weight:700}.page{max-width:800px;margin:40px auto;padding:0 24px}h2{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);margin-bottom:16px}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}table{width:100%;border-collapse:collapse}th{background:var(--dark);color:#fff;padding:10px 16px;text-align:left;font-size:11px;letter-spacing:.04em;font-weight:600}td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}tr:last-child td{border-bottom:none}tr:hover td{background:#F6F5F2}a{color:var(--dark);text-decoration:none;font-weight:500}a:hover{color:var(--light);text-decoration:underline}.latest{background:#E1F5EE}.footer{text-align:center;padding:32px 0;font-size:11px;color:var(--text3)}</style></head><body><div class="topbar"></div><div class="header"><img src="https://raw.githubusercontent.com/ryconnpm/inspection-portal/main/Ryconn-Property-Management-horizontal.png" alt="Ryconn"><div><div class="header-title">Dashboard Archive</div><div style="font-size:11px;opacity:.7;font-family:'DM Mono',monospace">0 reports</div></div></div><div class="page"><h2>All Dashboard Reports</h2><div class="card"><table><thead><tr><th>Report Date</th><th>Link</th></tr></thead><tbody></tbody></table></div><div class="footer">Ryconn Property Management — Internal Use Only</div></div></body></html>
